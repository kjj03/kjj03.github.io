<head>

<body class="bg-[#090d16] text-slate-100 min-h-screen flex flex-col justify-between font-sans overflow-x-hidden">

  <header>...</header> 
  
  <main class="max-w-6xl w-full mx-auto px-4 py-6 flex-grow relative mb-24 md:mb-6">
    <div id="home-view" class="space-y-6 sm:space-y-8">
      
      <div id="view-profile" class="space-y-6 hidden">
        <div class="bg-gradient-to-br from-indigo-950/40 to-slate-900 border border-indigo-500/20 rounded-2xl p-5 shadow-2xl flex items-center justify-between">
          <div class="flex items-center gap-5 w-full">
            <div class="space-y-2 flex-grow">
              <h2 class="text-xl font-black text-slate-100">
                <span id="profile-user-name">게스트 계정</span>
                <span class="text-xs text-slate-500" id="profile-user-email">(오프라인 모드)</span>
              </h2>
              <button id="auth-action-btn" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded-lg transition-all mt-2">

              </button>
            </div>
          </div>
        </div>
        </div>

          <div class="bg-slate-900/40 border border-indigo-500/30 p-5 rounded-2xl space-y-4">

            <div class="flex space-x-2">

              <button id="save-api-key-btn" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-sm">로컬 적용</button>
            </div>
          </div>
          </div>
      </div>
    </div>

  <script type="module" src="./js/app.js"></script>
